<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 NFC_MUSIC</title>
    <style>
        :root {
            --bg-color: #121212; /* 更深的背景，突出质感 */
            --card-color: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --sub-color: #aaaaaa;
            --accent-color: #1DB954; /* 经典 Spotify 绿 */
            --record-size: 280px;
            --progress-bg: #333;
        }

        [theme="light"] {
            --bg-color: #f0f0f0;
            --card-color: rgba(255, 255, 255, 0.9);
            --text-color: #222;
            --sub-color: #666;
            --accent-color: #1ED760;
            --progress-bg: #ddd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .player-card {
            background: var(--card-color);
            backdrop-filter: blur(25px);
            padding: 50px 25px 40px;
            border-radius: 40px;
            text-align: center;
            width: 350px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 25px; right: 25px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: var(--text-color); border: none;
            font-size: 16px; cursor: pointer;
            z-index: 30;
            display: flex; align-items: center; justify-content: center;
        }

        .info h2 { margin-bottom: 6px; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.8px; }
        .info p { color: var(--sub-color); font-size: 1rem; margin-bottom: 35px; font-weight: 500;}

        /* 唱片机容器 */
        .record-container {
            position: relative;
            width: var(--record-size);
            height: var(--record-size);
            margin: 0 auto 50px;
        }

        /* ==================== 极简版唱针 ==================== */
        .needle {
            position: absolute;
            top: -25px;
            right: 20px;
            width: 100px;
            height: 130px;
            z-index: 20;
            transform-origin: 50px 15px; /* 旋转中心点在圆盘中心 */
            transform: rotate(-30deg);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* 简约转轴圆盘 */
        .needle-pivot {
            position: absolute;
            top: 0; left: 35px;
            width: 30px; height: 30px;
            background: radial-gradient(circle at center, #eee 0%, #aaa 100%); /* 金属拉丝感 */
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            z-index: 2;
        }

        /* 极细指针臂 */
        .needle-arm {
            position: absolute;
            top: 15px; left: 48px;
            width: 2px; height: 100px; /* 极细，强调简约 */
            background: linear-gradient(to bottom, #999, #ccc 50%, #999);
            border-radius: 1px;
            transform: rotate(-12deg);
        }

        /* 简约针头 */
        .needle-head {
            position: absolute;
            bottom: -3px; right: -5px;
            width: 10px; height: 16px;
            background: #222;
            transform: rotate(20deg);
            border-radius: 1px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* ==================== 质感胶片 ==================== */
        .record {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #000;
            /* 模拟黑胶纹路 */
            background-image: repeating-radial-gradient(
                rgba(255,255,255,0.03) 0px, 
                rgba(255,255,255,0.03) 1px, 
                transparent 1px, 
                transparent 3px
            );
            border: 10px solid #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: rotate 15s linear infinite;
            animation-play-state: paused;
            position: relative;
        }

        /* 胶片高光 */
        .record::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.08) 50%, transparent 55%);
        }

        /* 唱片图案占比更大 */
        .cover {
            width: 75%; height: 75%; /* 增大占比，让图案更清晰 */
            border-radius: 50%;
            background-image: url('cover.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid #000;
            z-index: 1;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .playing .record { animation-play-state: running; }
        .playing .needle { transform: rotate(-3deg); } /* 落针位置调整 */

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 进度条样式 */
        .progress-container { width: 90%; margin: 0 auto 35px; }
        .progress-bar {
            -webkit-appearance: none;
            width: 100%; height: 4px;
            border-radius: 2px;
            background: var(--progress-bg);
            outline: none; cursor: pointer;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--accent-color);
            box-shadow: 0 0 8px rgba(29, 185, 84, 0.5);
        }

        .time {
            display: flex; justify-content: space-between;
            color: var(--sub-color); font-size: 0.75rem; margin-top: 10px; font-weight: 600; font-variant-numeric: tabular-nums;
        }

        .btn {
            background: var(--accent-color);
            color: #fff; border: none;
            padding: 16px 0; border-radius: 35px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 80%;
            box-shadow: 0 10px 20px rgba(29, 185, 84, 0.2);
            letter-spacing: 0.5px;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

<div class="player-card" id="main-card">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>

    <div class="info">
        <h2 id="title">BAN</h2>
        <p id="artist">櫻坂46</p>
    </div>

    <div class="record-container">
        <div class="needle">
            <div class="needle-pivot"></div>
            <div class="needle-arm">
                <div class="needle-head"></div>
            </div>
        </div>
        <div class="record">
            <div class="cover"></div>
        </div>
    </div>

    <div class="progress-container">
        <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
        <div class="time">
            <span id="current">0:00</span>
            <span id="total">0:00</span>
        </div>
    </div>

    <audio id="music" src="./music.mp3" preload="auto" loop></audio>
    <button class="btn" onclick="togglePlay()" id="btn-text">正在预载...</button>
</div>

<script>
    const card = document.getElementById('main-card');
    const audio = document.getElementById('music');
    const btn = document.getElementById('btn-text');
    const progress = document.getElementById('progress');
    const currentTimeEl = document.getElementById('current');
    const totalTimeEl = document.getElementById('total');
    const themeBtn = document.getElementById('theme-btn');

    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.innerText = formatTime(audio.duration);
        if (btn.innerText === "正在预载...") btn.innerText = "开启音乐";
    });

    audio.addEventListener('waiting', () => {
        if (!audio.paused) btn.innerText = "缓冲中...";
    });

    audio.addEventListener('canplay', () => {
        if (!audio.paused) btn.innerText = "暂停";
    });

    function togglePlay() {
        if (audio.paused) {
            btn.innerText = "正在唤醒...";
            audio.play().then(() => {
                card.classList.add('playing');
                btn.innerText = "暂停";
                btn.style.background = "#222"; /* 播放时按钮颜色更深，突出暂停图标感 */
            }).catch(e => {
                btn.innerText = "点击重试";
            });
        } else {
            audio.pause();
            card.classList.remove('playing');
            btn.innerText = "继续播放";
            btn.style.background = "var(--accent-color)";
        }
    }

    function toggleTheme() {
        const current = document.body.getAttribute('theme') || 'dark';
        if (current === 'dark') {
            document.body.setAttribute('theme', 'light');
            themeBtn.innerText = '🌙';
        } else {
            document.body.setAttribute('theme', 'dark');
            themeBtn.innerText = '☀️';
        }
    }

    audio.addEventListener('timeupdate', () => {
        if (!isNaN(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progress.value = percent;
            currentTimeEl.innerText = formatTime(audio.currentTime);
        }
    });

    progress.addEventListener('input', () => {
        const seekTime = (progress.value * audio.duration) / 100;
        audio.currentTime = seekTime;
    });

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    document.addEventListener('touchstart', () => {
        if (audio.readyState === 0) audio.load();
    }, { once: true });
</script>

</body>
</html>
